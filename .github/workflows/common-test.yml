name: Common Test

on:
  workflow_call:
    inputs:
      build_identifier:
        required: true
        type: string
      checkout_repository:
        required: false
        type: string
        default: ''
      checkout_ref:
        required: false
        type: string
        default: ''
      use_build_artifacts:
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      build_identifier:
        description: 'Carbon Build (and git branch) to run tests on'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - experimental
          - production
          - rust_beta/release
          - rust_beta/staging
          - rust_beta/aux01
          - rust_beta/aux02
          - rust_beta/aux03

jobs:
  configure:
    name: Setup (${{ inputs.build_identifier }})
    runs-on: ubuntu-latest
    outputs:
      download_id: ${{ steps.config.outputs.download_id }}
      rust_branch: ${{ steps.config.outputs.rust_branch }}
      build_config: ${{ steps.config.outputs.build_config }}
    steps:
      - id: config
        shell: bash
        run: |
          REF="${{ inputs.build_identifier }}"
          
          BUILD_CONFIG="Debug"
          RUST_BRANCH="release"

          case "$REF" in
            "main")
              DOWNLOAD_ID="edge_build"
              ;;
            "experimental")
              DOWNLOAD_ID="experimental_build"
              ;;
            "production")
              DOWNLOAD_ID="production_build"
              BUILD_CONFIG="Release"
              ;;
            "rust_beta/aux01")
              DOWNLOAD_ID="rustbeta_aux01_build"
              RUST_BRANCH="aux01-staging"
              ;;
            "rust_beta/aux02")
              DOWNLOAD_ID="rustbeta_aux02_build"
              RUST_BRANCH="aux02"
              ;;
            "rust_beta/aux03")
              DOWNLOAD_ID="rustbeta_aux03_build"
              RUST_BRANCH="aux03"
              ;;
            "rust_beta/staging")
              DOWNLOAD_ID="rustbeta_staging_build"
              RUST_BRANCH="staging"
              ;;
            "rust_beta/release")
              DOWNLOAD_ID="rustbeta_release_build"
              RUST_BRANCH="release"
              ;;
            *)
              echo "Unknown branch ref: $REF"
              exit 1
              ;;
          esac

          echo "download_id=$DOWNLOAD_ID" >> $GITHUB_OUTPUT
          echo "rust_branch=$RUST_BRANCH" >> $GITHUB_OUTPUT
          echo "build_config=$BUILD_CONFIG" >> $GITHUB_OUTPUT

  tests:
    name: Tests
    needs: configure
    runs-on: ${{ matrix.target }}
    continue-on-error: false
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: Linux
            target: ubuntu-latest
          - group: Windows
            target: windows-latest

    steps:
      - name: Git Clone
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.checkout_repository || github.repository }}
          ref: ${{ inputs.checkout_ref || inputs.build_identifier }}

      - name: Download Carbon Build
        if: inputs.use_build_artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-${{ matrix.group }}
          path: carbon-build

      - name: Resolve Carbon Download
        id: carbon-download
        shell: bash
        env:
          USE_BUILD_ARTIFACTS: ${{ inputs.use_build_artifacts }}
          GROUP: ${{ matrix.group }}
          BUILD_CONFIG: ${{ needs.configure.outputs.build_config }}
          DOWNLOAD_ID: ${{ needs.configure.outputs.download_id }}
          ARCHIVE: Carbon.${{ matrix.group }}.${{ needs.configure.outputs.build_config }}.${{ matrix.group == 'Linux' && 'tar.gz' || 'zip' }}
        run: |
          EXT="zip"
          if [ "$GROUP" = "Linux" ]; then
            EXT="tar.gz"
          fi

          if [ "$USE_BUILD_ARTIFACTS" = "true" ]; then
            if [ ! -f "carbon-build/$ARCHIVE" ]; then
              echo "::error::Expected build artifact not found: carbon-build/$ARCHIVE"
              ls -la carbon-build || true
              exit 1
            fi

            python -c 'import os; from pathlib import Path; uri = Path("carbon-build", os.environ["ARCHIVE"]).resolve().as_uri(); open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8").write(f"url={uri}\n")'
          else
            echo "url=https://github.com/CarbonCommunity/Carbon/releases/download/$DOWNLOAD_ID/Carbon.$GROUP.$BUILD_CONFIG.$EXT" >> $GITHUB_OUTPUT
          fi

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: DotNet Restore
        shell: bash
        run: |
          dotnet restore src/Carbon.Tests

      - name: DotNet Build
        shell: bash
        run: |
          dotnet build src/Carbon.Tests -c Release --no-restore

      - name: Run Tests
        shell: bash
        env:
          WorkingDir: TestRunner
          BranchName: ${{ needs.configure.outputs.rust_branch }}
          CarbonDownloadZipUrl: ${{ steps.carbon-download.outputs.url }}
        run: |
          dotnet run --project src/Carbon.Tests -c Release --no-build
