name: QA Build
concurrency: build-qa

on:
  workflow_dispatch:

jobs:
  call-common:
    uses: ./.github/workflows/common-core-build.yml
    name: Call Common Build
    permissions:
      contents: write
    with:
      # noinspection UndefinedParamsPresent
      GIT_BRANCH: qa
      # noinspection UndefinedParamsPresent
      RELEASE_BODY: |
        This is a manually triggered build of Carbon based on the `qa` branch.
        This build is high priority and dedicated to reflect what's to come in the upcoming `production` build. Primarily used by Quality Assurance community members.

        This build is targeted at developers or testers.
        The general public is advised to use one of the [stable] builds.
        Since it's manually triggered, we're confident you should use this build to test out the latest Carbon changes.

        ### How to install
        1. Download the `Carbon.[Windows|Linux].Debug` archive from the attachments below.
        2. Unzip the archive to the root of your Rust Dedicated Server.
        3. Restart the server and enjoy.

        [stable]: https://github.com/CarbonCommunity/Carbon.Core/releases/latest
    secrets:
      PAT_ALL_REPO: ${{ secrets.PAT_ALL_REPO }}
      VERSIONS_TOKEN: ${{ secrets.VERSIONS_TOKEN }}
